<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Machakos Grand Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --sand: #f6f1ea;
            --terracotta: #c76f4b;
            --forest: #2f3d36;
            --charcoal: #1f1f1f;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--sand);
            color: var(--charcoal);
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        .contact-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .contact-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.6rem;
            color: var(--forest);
        }
        .contact-header p {
            max-width: 640px;
            margin: 12px auto 0;
            color: #555;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .panel {
            background: #fff;
            padding: 28px;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(31, 31, 31, 0.08);
        }
        .panel h2 {
            color: var(--terracotta);
            margin-bottom: 18px;
        }
        .info-item {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
        }
        .info-item i {
            color: var(--terracotta);
            font-size: 1.1rem;
            margin-top: 4px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-family: 'Work Sans', sans-serif;
            margin-bottom: 14px;
        }
        textarea {
            min-height: 140px;
            resize: vertical;
        }
        .submit-btn {
            background: var(--terracotta);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="contact-header">
            <h1>Let us help plan your stay</h1>
            <p>Reach out for reservations, corporate bookings, weddings, or tailored itineraries.</p>
        </div>
        <div class="contact-grid">
            <div class="panel">
                <h2>Contact Details</h2>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <h3>Address</h3>
                        <p>123 Hillside Avenue, Machakos, Kenya</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone-alt"></i>
                    <div>
                        <h3>Phone</h3>
                        <p>0703670841</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h3>Email</h3>
                        <p>reservations@machakosgrand.com</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h3>Front Desk</h3>
                        <p>Open 24/7 · Restaurant 6AM - 11PM</p>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2>Send a Request</h2>
                <form action="#" method="POST">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>

                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone">

                    <label for="subject">Inquiry Type</label>
                    <select id="subject" name="subject">
                        <option value="reservation">Reservation</option>
                        <option value="events">Events & Weddings</option>
                        <option value="corporate">Corporate Travel</option>
                        <option value="feedback">Guest Feedback</option>
                    </select>

                    <label for="message">How can we help?</label>
                    <textarea id="message" name="message" required></textarea>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
